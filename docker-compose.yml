services:
  redis:
    image: redis:7-alpine
    container_name: ai_kb_redis
    ports:
      - "6380:6379" # Mapping internal 6379 to host 6380 to match .env
    volumes:
      - redis_data:/data
    restart: always

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ai_kb_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: always

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: ai_kb_minio
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - minio_data:/data
    command: minio server /data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: ai_kb_milvus
    command: [ "milvus", "run", "standalone" ]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      - "etcd"
      - "minio"
    restart: always

  api:
    build: .
    container_name: ai_kb_api
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_FILE_PATH=/app/logs/api.log
      - MILVUS_URI=http://milvus:19530
      - HF_HOME=/app/models_cache
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db
      - ./models_cache:/app/models_cache
      - ./uploads:/app/uploads
      - ./media:/app/media
    depends_on:
      - redis
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always

  worker:
    build: .
    container_name: ai_kb_worker
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_FILE_PATH=/app/logs/worker.log
      - MILVUS_URI=http://milvus:19530
      - HF_HOME=/app/models_cache
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db
      - ./models_cache:/app/models_cache
      - ./uploads:/app/uploads
    depends_on:
      - redis
    # Using solo pool for Windows-like stability in Celery (or standard for Linux Docker)
    command: celery -A app.services.tasks worker --loglevel=info -P solo
    restart: always

  mcp:
    build: .
    container_name: ai_kb_mcp
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_FILE_PATH=/app/logs/mcp.log
      - MILVUS_URI=http://milvus:19530
      - HF_HOME=/app/models_cache
      - PYTHONPATH=/app
    ports:
      - "9382:9382"
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db
    depends_on:
      - redis
    command: python -m app.mcp.mcp_server --transport sse --port 9382
    restart: always

volumes:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
